<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPU Video Editor — Core Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #0f1115;
        color: #e8eaed;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        grid-template-rows: minmax(240px, 1fr) 280px;
        height: 100vh;
      }

      .sidebar {
        grid-row: 1 / span 2;
        min-height: 0;
        border-right: 1px solid #2a2f3a;
      }

      .preview {
        padding: 1rem;
        border-bottom: 1px solid #2a2f3a;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .preview-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .preview-toolbar h2 {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
        color: #c5cad3;
      }

      .export-button {
        appearance: none;
        border: 1px solid #3d4658;
        border-radius: 0.5rem;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        padding: 0.5rem 0.9rem;
        cursor: pointer;
      }

      .export-button:hover:not(:disabled) {
        background: #1d4ed8;
      }

      .export-button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .export-status {
        margin: 0;
        font-size: 0.8rem;
        color: #9aa3b2;
        min-height: 1.2rem;
      }

      .preview-panel {
        flex: 1;
        min-height: 0;
        border: 1px solid #2a2f3a;
        border-radius: 0.75rem;
        background: #171a21;
      }

      .timeline {
        min-height: 0;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(240px, 1fr) 280px;
        }

        .sidebar {
          grid-row: auto;
          border-right: none;
          border-bottom: 1px solid #2a2f3a;
          max-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside id="sidebar" class="sidebar"></aside>
      <section class="preview">
        <div class="preview-toolbar">
          <h2>Preview</h2>
          <button id="export-button" class="export-button" type="button" disabled>
            Export video
          </button>
        </div>
        <p id="export-status" class="export-status" aria-live="polite"></p>
        <div id="canvas" class="preview-panel"></div>
      </section>
      <section id="timeline" class="timeline"></section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
