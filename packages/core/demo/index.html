<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPU Video Editor — Core Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #0f1115;
        color: #e8eaed;
      }

      .layout {
        display: grid;
        grid-template-columns: 40% 60%;
        grid-template-rows: minmax(240px, 1fr) 280px;
        height: 100vh;
      }

      .sidebar {
        min-height: 0;
        border-right: 1px solid #2a2f3a;
      }

      .preview {
        padding: 1rem;
        border-bottom: 1px solid #2a2f3a;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .preview-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .preview-toolbar h2 {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
        color: #c5cad3;
      }

      .preview-panel {
        flex: 1;
        min-height: 0;
        border: 1px solid #2a2f3a;
        border-radius: 0.75rem;
        background: #171a21;
      }

      .timeline {
        grid-column: 1 / -1;
        width: 100%;
        min-height: 0;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(240px, 1fr) 280px;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid #2a2f3a;
          max-height: 320px;
        }

        .timeline {
          grid-column: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside id="sidebar" class="sidebar"></aside>
      <section class="preview">
        <div class="preview-toolbar">
          <h2>Preview</h2>
        </div>
        <div id="canvas" class="preview-panel"></div>
      </section>
      <section id="timeline" class="timeline"></section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
